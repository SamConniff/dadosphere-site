<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE DADOSPHERE</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ctext x='16' y='24' font-family='monospace' font-size='25' font-weight='800' fill='%23fff' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="A social experiment in collective intelligence and lived experience — for the questions men and boys often carry alone.">
<meta property="og:title" content="THE DADOSPHERE">
<meta property="og:description" content="80% of men said they had a tough question and nowhere to ask it. What's yours?">
<meta property="og:url" content="https://thedadosphere.com">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<!-- Privacy-friendly, cookieless analytics by Plausible -->
<script async src="https://plausible.io/js/pa-aOP9Xw_iGjaMVPpsV9FYn.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>

<style>
  :root{--g:#FF2D87;--mono:'IBM Plex Mono',monospace;--monb:'JetBrains Mono',monospace;
        --ink0:#fff;--ink1:#999;--ink2:#888;--ink3:#555;--ink4:#2a2a2a}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;height:100%}
  body{color:#fff;font-family:var(--mono);line-height:1.6;min-height:100vh;
       display:flex;align-items:center;justify-content:center}
  ::selection{background:var(--g);color:#000}
  @keyframes blink{50%{opacity:0}}

  /* ---- password gate (pre-launch) ---- */
  #gate{position:fixed;inset:0;background:#000;z-index:200;display:flex;align-items:center;justify-content:center;padding:40px 26px}
  #gate.hidden{display:none}
  #gate .gatebox{width:min(420px,100%);text-align:left}
  #gate .gt{font-family:var(--monb);font-weight:800;font-size:clamp(17px,3vw,23px);letter-spacing:.04em;margin-bottom:24px}
  #gate .gt span{color:var(--g)}
  #gate .gp{display:flex;align-items:baseline;gap:10px;font-size:18px;border-bottom:1px solid var(--ink4);padding-bottom:8px}
  #gate .gpr{color:var(--ink2)}
  #gate #gpw{background:transparent;border:none;outline:none;color:#fff;font-family:var(--mono);font-size:18px;flex:1;min-width:0;letter-spacing:.25em}
  #gate #gpw::placeholder{color:var(--ink3);letter-spacing:normal}
  #gate .gcur{display:inline-block;width:.5em;height:2px;background:var(--g);animation:blink 1.05s steps(1) infinite}
  #gate .gmsg{color:var(--ink2);font-size:12.5px;margin-top:16px;min-height:16px;letter-spacing:.02em}

  .welcome{text-align:left;padding:40px 26px;width:min(820px,100%)}

  .w-line1{
    font-family:var(--monb);font-weight:800;
    font-size:clamp(22px,4vw,38px);line-height:1.3;
    opacity:0;
    animation:fadeup 1.7s cubic-bezier(.2,.6,.2,1) forwards;
    animation-delay:.35s;
  }

  .w-line2{
    color:var(--ink1);
    font-size:clamp(14px,2vw,18px);line-height:1.6;
    margin-top:18px;
    opacity:0;
    animation:fadeup 1.5s cubic-bezier(.2,.6,.2,1) forwards;
    animation-delay:1.3s;
  }

  .w-btn{
    display:inline-block;
    margin-top:36px;
    font-family:var(--monb);font-weight:700;
    font-size:clamp(15px,2vw,19px);
    color:#fff;
    text-decoration:none;
    border-bottom:2px solid var(--g);
    padding-bottom:3px;
    cursor:pointer;
    opacity:0;
    animation:fadein 1s ease forwards;
    animation-delay:2.4s;
    user-select:none;
  }
  .w-btn:hover{color:var(--g)}

  @keyframes fadein{to{opacity:1}}
  @keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- PASSWORD GATE — pre-launch. Password not in source, only its SHA-256 hash. -->
<div id="gate">
  <div class="gatebox">
    <div class="gt">THE DADOSPHERE <span>_</span></div>
    <div class="gp">
      <span class="gpr">&gt;</span>
      <input id="gpw" type="password" autocomplete="off" spellcheck="false" placeholder="password" aria-label="password">
      <span class="gcur"></span>
    </div>
    <div class="gmsg" id="gmsg"></div>
  </div>
</div>

<div class="welcome">
  <div class="w-line1">Watch out, lads, here come the Dads.</div>
  <div class="w-line2">A social experiment in collective intelligence and lived experience<br>for the questions men and boys often carry alone.</div>
  <div class="w-btn" id="enter">Enter the Dadosphere →</div>
</div>

<script>
/* ---- password gate: must pass before the welcome page (and the site) ---- */
(function(){
  var PW_HASH='1225e2cc36de14f05c707de77e8dc48d9db7e8d3b0a5ce574d6c886abe4bcf09';
  var gate=document.getElementById('gate');
  var pw=document.getElementById('gpw'), msg=document.getElementById('gmsg');

  function proceed(){
    /* returning visitors (within 30 days) skip the welcome and go straight to the site */
    try{
      var KEY='dad_visited', TTL=30*24*60*60*1000;
      var stored=localStorage.getItem(KEY);
      if(stored&&(Date.now()-parseInt(stored,10))<TTL){ window.location.replace('oracle.html'); return; }
    }catch(e){}
    /* otherwise the welcome page is now visible behind the (removed) gate */
  }
  function openGate(){ gate.classList.add('hidden'); proceed(); }

  try{ if(sessionStorage.getItem('ds_gate')==='1'){ openGate(); return; } }catch(e){}
  setTimeout(function(){try{pw.focus();}catch(e){}},60);

  async function check(){
    var v=pw.value; if(!v)return;
    try{
      var buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
      var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
      if(hex===PW_HASH){ try{sessionStorage.setItem('ds_gate','1');}catch(e){} openGate(); }
      else{ msg.textContent='nope.'; pw.value=''; pw.focus(); }
    }catch(e){ msg.textContent='this needs a modern browser.'; }
  }
  pw.addEventListener('keydown', function(e){ if(e.key==='Enter') check(); });
})();

/* ---- enter button: stamp the visit and go to the site ---- */
(function(){
  var btn=document.getElementById('enter');
  if(!btn)return;
  btn.addEventListener('click',function(){
    try{localStorage.setItem('dad_visited',String(Date.now()));}catch(e){}
    try{window.plausible&&window.plausible('welcome_enter_clicked');}catch(e){}
    window.location.href='oracle.html';
  });
})();
</script>
</body>
</html>
