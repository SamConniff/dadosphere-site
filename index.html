<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE DADOSPHERE</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ctext x='16' y='24' font-family='monospace' font-size='25' font-weight='800' fill='%23fff' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
<meta name="robots" content="index, follow">
<meta name="description" content="A social experiment in collective intelligence and lived experience — for the questions men and boys often carry alone.">
<meta property="og:title" content="THE DADOSPHERE">
<meta property="og:description" content="Watch out, lads, here come the Dads. The questions men carry alone, answered by 500+ men.">
<meta property="og:url" content="https://thedadosphere.com">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<!-- Privacy-friendly, cookieless analytics by Plausible -->
<script async src="https://plausible.io/js/pa-aOP9Xw_iGjaMVPpsV9FYn.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>

<style>
  :root{--g:#FF2D87;--mono:'IBM Plex Mono',monospace;--monb:'JetBrains Mono',monospace;
        --ink0:#fff;--ink1:#999;--ink2:#888;--ink3:#555;--ink4:#2a2a2a}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000}
  body{color:#fff;font-family:var(--mono);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
  ::selection{background:var(--g);color:#000}
  @keyframes fadein{to{opacity:1}}
  @keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* the opener — positioning statement + the way in. That's it. */
  .welcome{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:left;
           width:min(820px,100%);margin:0 auto;padding:40px 26px}
  .w-line1{font-family:var(--monb);font-weight:800;font-size:clamp(24px,4.5vw,42px);line-height:1.25;
           opacity:0;animation:fadeup 1.9s cubic-bezier(.2,.6,.2,1) forwards;animation-delay:.4s}
  .w-line2{color:var(--ink1);font-size:clamp(14px,2vw,18px);line-height:1.6;margin-top:20px;max-width:560px;
           opacity:0;animation:fadeup 1.6s cubic-bezier(.2,.6,.2,1) forwards;animation-delay:1.4s}
  .w-btn{display:inline-block;width:fit-content;margin-top:40px;font-family:var(--monb);font-weight:700;
         font-size:clamp(15px,2vw,19px);color:#fff;text-decoration:none;border-bottom:2px solid var(--g);
         padding-bottom:3px;opacity:0;animation:fadein 1.1s ease forwards;animation-delay:2.5s}
  .w-btn:hover{color:var(--g)}

  /* footer — anonymity + the always-present crisis line (Safeguarding Policy §7) */
  .foot{width:min(820px,100%);margin:0 auto;padding:0 26px 34px;color:var(--ink3);font-size:11px;line-height:1.85;
        opacity:0;animation:fadein 1.1s ease forwards;animation-delay:3s}
  .foot .mono{color:var(--ink2)}
</style>
</head>
<body>
  <div class="welcome">
    <div class="w-line1">Watch out, lads, here come the Dads.</div>
    <div class="w-line2">A social experiment in collective intelligence and lived experience —<br>for the questions men and boys often carry alone.</div>
    <a class="w-btn" id="enter" href="oracle.html">Enter the Dadosphere &rarr;</a>
  </div>

  <div class="foot">
    <span class="mono">The Dadosphere is 100% anonymous. Cookies are for monsters.</span><br>
    beta · launching Father's Day 2026
  </div>

<script>
  try{var b=document.getElementById('enter');if(b)b.addEventListener('click',function(){try{window.plausible&&window.plausible('welcome_enter_clicked');}catch(e){}});}catch(e){}
</script>
</body>
</html>
